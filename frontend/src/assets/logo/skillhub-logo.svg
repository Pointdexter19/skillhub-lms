<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none" height="32">
  <!-- Icon: a stamped index tab, matching the in-app "SH" mark -->
  <rect x="2" y="4" width="30" height="30" rx="4" fill="#c9a24b"/>
  <text x="17" y="24" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#0b0d10" text-anchor="middle">SH</text>

  <!-- Wordmark: "Skill" plain + "Hub" in brass -->
  <text x="43" y="27" font-family="'Fraunces', serif" font-size="19" font-weight="600" letter-spacing="-0.3" fill="currentColor">Skill</text>
  <text x="90" y="27" font-family="'Fraunces', serif" font-size="19" font-weight="600" letter-spacing="-0.3" fill="#c9a24b">Hub</text>
</svg>
